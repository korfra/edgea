name: Deploy to GHCR

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g.: v1.0.1)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref_name }}

      - name: Set image tags
        id: tags
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

          {
            echo "tags<<EOF"
            echo "ghcr.io/${{ github.repository }}:$VERSION"
            echo "ghcr.io/${{ github.repository }}:$MAJOR_MINOR"
            echo "ghcr.io/${{ github.repository }}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        if: github.event_name == 'release'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (release)
        if: github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgea
  labels:
    app: edgea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgea
  template:
    metadata:
      labels:
        app: edgea
    spec:
      containers:
        - name: edgea
          image: ghcr.io/korfra/edgea:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: S3_ENDPOINT
              value: 's3.example.com'
            - name: S3_PORT
              value: '443'
            - name: S3_ACCESS_KEY
              value: 'your-access-key'
            - name: S3_SECRET_KEY
              value: 'your-secret-key'
            - name: S3_BUCKET_NAME
              value: '*'
            - name: S3_USE_SSL
              value: 'true'
            - name: S3_PATH_STYLE
              value: 'true'
            - name: CDN_CACHE_CONTROL
              value: 'public, max-age=31536000, immutable'
            - name: CDN_HOST
              value: '0.0.0.0'
            - name: CDN_PORT
              value: '3000'
            - name: CACHE_MAX_ITEMS
              value: '500'
            - name: CACHE_MAX_SIZE_MB
              value: '50'
            - name: CACHE_TTL_SEC
              value: '3600'
          resources:
            limits:
              cpu: '500m'
              memory: '256Mi'
            requests:
              cpu: '100m'
              memory: '128Mi'
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: edgea
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: edgea

services:
  minio-cdn:
    image: ghcr.io/sooluh/minio-cdn:latest
    container_name: minio-cdn
    restart: always
    ports:
      - '3000:3000'
    environment:
      - MINIO_ENDPOINT=s3.example.com
      - MINIO_PORT=443
      - MINIO_ACCESS_KEY=your-access-key
      - MINIO_SECRET_KEY=your-secret-key
      - MINIO_BUCKET_NAME=*
      - MINIO_USE_SSL=true
      - MINIO_PATH_STYLE=true
      - MINIO_CACHE_CONTROL=public, max-age=31536000, immutable
      - MINIO_CDN_HOST=0.0.0.0
      - MINIO_CDN_PORT=3000
      - CACHE_MAX_ITEMS=1000
      - CACHE_MAX_SIZE_MB=100
      - CACHE_TTL_SEC=3600
    healthcheck:
      test: ['CMD', 'bun', 'src/healthcheck.ts']
      interval: 30s
      timeout: 10s
      retries: 3
